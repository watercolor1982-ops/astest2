<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASシミュレーター V2 Pro</title>
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-card: #000000;
            --accent-gold: #d4af37;
            --accent-blue: #00d4ff;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --success: #27ae60;
            --danger: #c0392b;
            --input-bg: #1a1a1a;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; background-color: var(--bg-deep); color: var(--text-main); 
            padding: 10px; line-height: 1.4; margin: 0;
        }
        .card { 
            max-width: 850px; margin: auto; background-color: var(--bg-card); 
            padding: 20px; border-radius: 12px; border: 1px solid #222;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }
        h1 { 
            text-align: center; color: var(--accent-gold); 
            font-size: 1.6em; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px;
        }

        .info-banner {
            background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--accent-gold);
            padding: 10px; border-radius: 4px; margin-bottom: 25px; font-size: 0.8em; color: #888;
        }

        /* 設定エリア */
        .setup-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 12px; margin-bottom: 25px; background: #111; padding: 15px; border-radius: 10px;
        }
        @media (min-width: 600px) { .setup-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 0.75em; font-weight: bold; color: var(--accent-gold); margin-bottom: 6px; }

        input, select { 
            background: var(--input-bg); border: 1px solid #333; border-radius: 4px; 
            color: #fff; padding: 8px; font-size: 1em; outline: none; text-align: center; width: 100%;
        }

        /* テーブル */
        .table-wrapper { width: 100%; margin-bottom: 25px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; color: var(--accent-gold); font-size: 0.8em; padding: 10px 2px; border-bottom: 1px solid #222; }
        td { padding: 10px 2px; border-bottom: 1px solid #111; text-align: center; vertical-align: middle; }
        .day-label { font-weight: bold; color: var(--accent-gold); font-size: 1.1em; }

        /* ▲▼ボタン付き入力欄（常時表示・縦積み） */
        .num-wrapper { display: inline-flex; align-items: center; gap: 4px; background: var(--input-bg); border: 1px solid #333; border-radius: 4px; padding-right: 2px; }
        .num-wrapper input { border: none; background: transparent; width: 50px; padding: 6px 2px; font-size: 1em; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 1px; }
        .m-btn {
            background: #2a2a2a; border: none; color: var(--accent-gold);
            width: 24px; height: 16px; border-radius: 2px; font-size: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;
        }
        .m-btn:active { background: #444; }

        /* スマホ用（画面幅600px以下）の微調整 */
        @media (max-width: 600px) {
            .card { padding: 15px 10px; border: 1px solid var(--accent-gold); }
            th { font-size: 0.65em; }
            .day-label { font-size: 1em; width: 30px; }
            .num-wrapper input { width: 35px; font-size: 0.9em; }
            .m-btn { width: 20px; height: 14px; }
            .s-res-wrap { font-size: 0.8em; white-space: nowrap; }
            h1 { font-size: 1.3em; }
        }

        /* 結果表示エリア */
        .res-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 600px) { .res-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; } }
        
        .box { padding: 15px; border-radius: 10px; text-align: center; background: #0a0a0a; border: 1px solid #222; }
        .profit { 
            background: linear-gradient(145deg, #1e5631, #0a2012); 
            border: 1px solid var(--success); margin-bottom: 5px;
        }
        @media (min-width: 600px) { .profit { grid-column: span 3; } }
        
        .val { font-size: 1.5em; font-weight: bold; display: block; margin-top: 5px; }
        .label { font-size: 0.7em; color: #888; font-weight: bold; }
        
        #peakLot { color: var(--accent-gold); }
        .s-res { color: var(--accent-blue); font-weight: bold; }
        .footer-note { font-size: 0.7em; color: #444; text-align: center; margin-top: 20px; line-height: 1.5; }
        
        /* スピンボタン消去 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>

<div class="card">
    <h1>ASシミュレーター V2 Pro</h1>

    <div class="info-banner">
        ※1日最大5ポジション、1回最大0.12Lot、最大保有7日間の公式ルールに準拠。
    </div>

    <div class="setup-grid">
        <div class="group"><label>変動バッファ(円)</label><input type="number" id="vol" value="1.0" step="0.5" oninput="calc()"></div>
        <div class="group"><label>0.1Lotスワップ</label><input type="number" id="swap" value="100" oninput="calc()"></div>
        <div class="group"><label>USD/JPY</label><input type="number" id="rate" value="160.0" step="0.1" oninput="calc()"></div>
        <div class="group">
            <label>3倍デー設定</label>
            <select id="tripleDay" onchange="calc()">
                <option value="3" selected>水曜</option><option value="1">月曜</option><option value="2">火曜</option><option value="4">木曜</option><option value="5">金曜</option>
            </select>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="asTable">
            <thead>
                <tr>
                    <th>曜日</th>
                    <th>回数(最大5)</th>
                    <th>Lot(最大0.12)</th>
                    <th>保有(最大7)</th>
                    <th>獲得スワップ</th>
                </tr>
            </thead>
            <tbody>
                <tr data-day="1">
                    <td class="day-label">月</td>
                    <td><div class="num-wrapper"><input type="number" class="p" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,0.01)">▲</button><button class="m-btn" onclick="adj(this,-0.01)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="h" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td class="s-res-wrap"><span class="s-res">-</span>日分</td>
                </tr>
                <tr data-day="2">
                    <td class="day-label">火</td>
                    <td><div class="num-wrapper"><input type="number" class="p" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,0.01)">▲</button><button class="m-btn" onclick="adj(this,-0.01)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="h" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td class="s-res-wrap"><span class="s-res">-</span>日分</td>
                </tr>
                <tr data-day="3">
                    <td class="day-label">水</td>
                    <td><div class="num-wrapper"><input type="number" class="p" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,0.01)">▲</button><button class="m-btn" onclick="adj(this,-0.01)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="h" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td class="s-res-wrap"><span class="s-res">-</span>日分</td>
                </tr>
                <tr data-day="4">
                    <td class="day-label">木</td>
                    <td><div class="num-wrapper"><input type="number" class="p" value="0" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,0.01)">▲</button><button class="m-btn" onclick="adj(this,-0.01)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="h" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td class="s-res-wrap"><span class="s-res">-</span>日分</td>
                </tr>
                <tr data-day="5">
                    <td class="day-label">金</td>
                    <td><div class="num-wrapper"><input type="number" class="p" value="0" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,0.01)">▲</button><button class="m-btn" onclick="adj(this,-0.01)">▼</button></div></div></td>
                    <td><div class="num-wrapper"><input type="number" class="h" value="5" oninput="calc()"><div class="btn-stack"><button class="m-btn" onclick="adj(this,1)">▲</button><button class="m-btn" onclick="adj(this,-1)">▼</button></div></div></td>
                    <td class="s-res-wrap"><span class="s-res">-</span>日分</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="res-grid">
        <div class="box profit"><span class="label" style="color:#eee;">一ヶ月の期待利益額</span><span class="val" id="resProfit">0 円</span></div>
        <div class="box" style="grid-column: 1 / -1;"><span class="label">最大保有ロット (ピーク時)</span><span class="val" id="peakLot">0.00 Lot</span></div>
        <div class="box" style="border-top: 2px solid var(--accent-blue);"><span class="label">海外必要資金</span><span class="val" id="resXM">0 円</span></div>
        <div class="box" style="border-top: 2px solid var(--danger);"><span class="label">国内必要資金</span><span class="val" id="resRakuten">0 円</span></div>
        <div class="box"><span class="label">内バッファ (安全資金)</span><span class="val" id="resBuffer" style="color:#888;">0 円</span></div>
    </div>
    <div class="footer-note">※土日はカウントせず3倍デーを自動加算。最大露出は重複を含めたピーク時を採用。</div>
</div>

<script>
    function adj(btn, delta) {
        const input = btn.closest('.num-wrapper').querySelector('input');
        let val = parseFloat(input.value) + delta;
        const cls = input.className;
        if (cls === 'p') val = Math.max(0, Math.min(5, val));
        if (cls === 'l') val = Math.max(0, Math.min(0.12, parseFloat(val.toFixed(2))));
        if (cls === 'h') val = Math.max(0, Math.min(7, val));
        input.value = (cls === 'l') ? val.toFixed(2) : Math.round(val);
        calc();
    }

    async function fetchRate() {
        try {
            const res = await fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=JPY');
            const data = await res.json();
            document.getElementById('rate').value = data.rates.JPY.toFixed(2);
        } catch (e) {}
        calc();
    }

    function calc() {
        const vol = parseFloat(document.getElementById('vol').value) || 0;
        const swap01 = parseFloat(document.getElementById('swap').value) || 0;
        const rate = parseFloat(document.getElementById('rate').value) || 0;
        const tripleDay = parseInt(document.getElementById('tripleDay').value);
        const rows = document.querySelectorAll('#asTable tbody tr');
        let weeklyProfit = 0; let timeline = new Array(21).fill(0); 

        rows.forEach((row, index) => {
            const entryDay = index + 1;
            const p = Math.min(5, parseFloat(row.querySelector('.p').value) || 0);
            const l = Math.min(0.12, parseFloat(row.querySelector('.l').value) || 0);
            const h = Math.min(7, parseInt(row.querySelector('.h').value) || 0);
            
            let actualSwapDays = 0;
            if (h > 0) {
                let currentDay = entryDay;
                for (let i = 0; i < h; i++) {
                    actualSwapDays += 1;
                    if (currentDay === tripleDay) actualSwapDays += 2;
                    currentDay++; if (currentDay > 5) currentDay = 1;
                }
            }
            row.querySelector('.s-res').innerText = (p > 0) ? actualSwapDays : 0;
            weeklyProfit += p * (l / 0.1) * swap01 * actualSwapDays;

            for(let week=0; week<2; week++) {
                let start = (week * 7) + (entryDay - 1);
                let dayCounter = 0; let t = entryDay; let offset = 0;
                while(dayCounter < h) {
                    if (start + offset < 21) timeline[start + offset] += (p * l);
                    if (t <= 5) dayCounter++;
                    t++; if(t > 7) t = 1;
                    offset++;
                }
            }
        });

        const peakLot = Math.max(...timeline);
        const units = peakLot * 100000; const buffer = units * vol;
        document.getElementById('resProfit').innerText = Math.floor(weeklyProfit * 4).toLocaleString() + " 円";
        document.getElementById('peakLot').innerText = peakLot.toFixed(2) + " Lot";
        document.getElementById('resXM').innerText = Math.round((units * rate / 1000) + buffer).toLocaleString() + " 円";
        document.getElementById('resRakuten').innerText = Math.round((units * rate / 25) + buffer).toLocaleString() + " 円";
        document.getElementById('resBuffer').innerText = Math.round(buffer).toLocaleString() + " 円";
    }
    window.onload = fetchRate;
</script>
</body>
</html>
