<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASシミュレーター V2 Pro</title>
    <style>
        :root {
            --bg-deep: #1a1a1a;
            --bg-card: #000000;
            --accent-gold: #d4af37;
            --accent-blue: #00d4ff;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --success: #27ae60;
            --danger: #c0392b;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; background-color: var(--bg-deep); color: var(--text-main); 
            padding: 10px; line-height: 1.4; margin: 0;
        }
        .card { 
            max-width: 850px; margin: auto; background-color: var(--bg-card); 
            padding: 25px; border-radius: 15px; border: 1px solid var(--accent-gold);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }
        h1 { 
            text-align: center; color: var(--accent-gold); 
            font-size: 1.6em; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px;
        }

        /* 設定エリア */
        .setup-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; margin-bottom: 25px; background: #111; padding: 15px; border-radius: 10px;
        }
        @media (min-width: 600px) { .setup-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 0.75em; font-weight: bold; color: var(--accent-gold); margin-bottom: 5px; }
        input, select { 
            background: #222; border: 1px solid #444; border-radius: 5px; 
            color: #fff; padding: 8px; font-size: 1em; outline: none; text-align: center;
        }

        /* テーブル */
        .table-wrapper { width: 100%; overflow-x: auto; margin-bottom: 25px; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 550px; }
        th { background: #222; color: var(--accent-gold); font-size: 0.8em; padding: 12px 5px; border-bottom: 2px solid #333; }
        td { padding: 10px 5px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        .day-label { font-weight: bold; color: var(--accent-gold); width: 50px; }

        /* スマホ専用ボタン設定 */
        .num-wrapper { display: inline-flex; align-items: center; gap: 4px; }
        .m-btn {
            display: none; /* PCでは隠す */
            background: #222; border: 1px solid #555; color: var(--accent-gold);
            width: 30px; height: 30px; border-radius: 4px; font-size: 10px;
            align-items: center; justify-content: center; cursor: pointer;
        }
        
        @media (max-width: 600px) {
            .m-btn { display: flex; } /* スマホの時だけ出す */
            td input { width: 50px !important; }
            h1 { font-size: 1.3em; }
        }

        td input { width: 80px; background: #111; border: 1px solid #333; color: #fff; padding: 6px; border-radius: 4px; text-align: center; }

        /* 結果エリア */
        .res-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 600px) { .res-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .box { padding: 18px; border-radius: 10px; text-align: center; background: #0a0a0a; border: 1px solid #333; }
        .profit { background: linear-gradient(145deg, #1e5631, #0a2012); border: 1px solid var(--success); }
        @media (min-width: 600px) { .profit { grid-column: span 3; } }
        
        .val { font-size: 1.5em; font-weight: bold; display: block; margin-top: 5px; }
        .label { font-size: 0.75em; color: #888; font-weight: bold; }
        
        #peakLot { color: var(--accent-gold); }
        .s-res { color: var(--accent-blue); font-weight: bold; }
        .footer-note { font-size: 0.7em; color: #666; text-align: center; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h1>ASシミュレーター V2 Pro</h1>

    <div class="setup-grid">
        <div class="group"><label>変動バッファ(円)</label><input type="number" id="vol" value="1.0" step="0.5" oninput="calc()"></div>
        <div class="group"><label>0.1Lotスワップ</label><input type="number" id="swap" value="100" oninput="calc()"></div>
        <div class="group"><label>USD/JPY</label><input type="number" id="rate" value="160.0" step="0.1" oninput="calc()"></div>
        <div class="group">
            <label>3倍デー設定</label>
            <select id="tripleDay" onchange="calc()">
                <option value="3" selected>水曜</option><option value="1">月曜</option><option value="2">火曜</option><option value="4">木曜</option><option value="5">金曜</option>
            </select>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="asTable">
            <thead><tr><th>曜日</th><th>回数(最大5)</th><th>Lot(最大0.12)</th><th>保有(最大7)</th><th>獲得スワップ</th></tr></thead>
            <tbody>
                <tr data-day="1"><td class="day-label">月</td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="p" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-0.01)">▼</button><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><button class="m-btn" onclick="adj(this,0.01)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="h" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><span class="s-res">-</span>日分</td></tr>
                <tr data-day="2"><td class="day-label">火</td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="p" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-0.01)">▼</button><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><button class="m-btn" onclick="adj(this,0.01)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="h" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><span class="s-res">-</span>日分</td></tr>
                <tr data-day="3"><td class="day-label">水</td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="p" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-0.01)">▼</button><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><button class="m-btn" onclick="adj(this,0.01)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="h" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><span class="s-res">-</span>日分</td></tr>
                <tr data-day="4"><td class="day-label">木</td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="p" value="0" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-0.01)">▼</button><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><button class="m-btn" onclick="adj(this,0.01)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="h" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><span class="s-res">-</span>日分</td></tr>
                <tr data-day="5"><td class="day-label">金</td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="p" value="0" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-0.01)">▼</button><input type="number" class="l" value="0.10" step="0.01" oninput="calc()"><button class="m-btn" onclick="adj(this,0.01)">▲</button></div></td><td><div class="num-wrapper"><button class="m-btn" onclick="adj(this,-1)">▼</button><input type="number" class="h" value="5" oninput="calc()"><button class="m-btn" onclick="adj(this,1)">▲</button></div></td><td><span class="s-res">-</span>日分</td></tr>
            </tbody>
        </table>
    </div>

    <div class="res-grid">
        <div class="box profit"><span class="label" style="color:#eee;">期待できる一ヶ月あたりの利益額</span><span class="val" id="resProfit">0 円</span></div>
        <div class="box" style="grid-column: 1 / -1;"><span class="label">最大保有ロット (ピーク時)</span><span class="val" id="peakLot">0.00 Lot</span></div>
        <div class="box" style="border-top: 2px solid var(--accent-blue);"><span class="label">海外必要資金</span><span class="val" id="resXM">0 円</span></div>
        <div class="box" style="border-top: 2px solid var(--danger);"><span class="label">国内必要資金</span><span class="val" id="resRakuten">0 円</span></div>
        <div class="box"><span class="label">内バッファ</span><span class="val" id="resBuffer" style="color:#888;">0 円</span></div>
    </div>
    <div class="footer-note">※土日はカウントせず3倍デーを自動加算。</div>
</div>

<script>
    // スマホ用▲▼ボタンの関数
    function adj(btn, delta) {
        const input = btn.parentElement.querySelector('input');
        let val = parseFloat(input.value) + delta;
        const cls = input.className;
        if (cls === 'p') val = Math.max(0, Math.min(5, val));
        if (cls === 'l') val = Math.max(0, Math.min(0.12, parseFloat(val.toFixed(2))));
        if (cls === 'h') val = Math.max(0, Math.min(7, val));
        input.value = (cls === 'l') ? val.toFixed(2) : Math.round(val);
        calc();
    }

    async function fetchRate() {
        try {
            const res = await fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=JPY');
            const data = await res.json();
            document.getElementById('rate').value = data.rates.JPY.toFixed(2);
        } catch (e) {}
        calc(); // レート取得後に計算
    }

    function calc() {
        const vol = parseFloat(document.getElementById('vol').value) || 0;
        const swap01 = parseFloat(document.getElementById('swap').value) || 0;
        const rate = parseFloat(document.getElementById('rate').value) || 0;
        const tripleDay = parseInt(document.getElementById('tripleDay').value);
        const rows = document.querySelectorAll('#asTable tbody tr');
        let weeklyProfit = 0; let timeline = new Array(21).fill(0); 

        rows.forEach((row, index) => {
            const entryDay = index + 1;
            const pInput = row.querySelector('.p');
            const lInput = row.querySelector('.l');
            const hInput = row.querySelector('.h');
            if(!pInput || !lInput || !hInput) return;

            const p = Math.min(5, parseFloat(pInput.value) || 0);
            const l = Math.min(0.12, parseFloat(lInput.value) || 0);
            const h = Math.min(7, parseInt(hInput.value) || 0);

            let actualSwapDays = 0;
            if (h > 0) {
                let currentDay = entryDay;
                for (let i = 0; i < h; i++) {
                    actualSwapDays += 1;
                    if (currentDay === tripleDay) actualSwapDays += 2;
                    currentDay++; if (currentDay > 5) currentDay = 1;
                }
            }
            row.querySelector('.s-res').innerText = (p > 0) ? actualSwapDays : 0;
            weeklyProfit += p * (l / 0.1) * swap01 * actualSwapDays;

            for(let week=0; week<2; week++) {
                let start = (week * 7) + (entryDay - 1);
                let dayCounter = 0; let t = entryDay; let offset = 0;
                while(dayCounter < h) {
                    if (start + offset < 21) timeline[start + offset] += (p * l);
                    if (t <= 5) dayCounter++;
                    t++; if(t > 7) t = 1;
                    offset++;
                }
            }
        });
        const peakLot = Math.max(...timeline);
        const units = peakLot * 100000; const buffer = units * vol;
        document.getElementById('resProfit').innerText = Math.floor(weeklyProfit * 4).toLocaleString() + " 円";
        document.getElementById('peakLot').innerText = peakLot.toFixed(2) + " Lot";
        document.getElementById('resXM').innerText = Math.round((units * rate / 1000) + buffer).toLocaleString() + " 円";
        document.getElementById('resRakuten').innerText = Math.round((units * rate / 25) + buffer).toLocaleString() + " 円";
        document.getElementById('resBuffer').innerText = Math.round(buffer).toLocaleString() + " 円";
    }
    // 起動時に確実に実行
    window.onload = fetchRate;
</script>
</body>
</html>
